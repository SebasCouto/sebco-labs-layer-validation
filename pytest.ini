[pytest]
addopts = -p no:warnings -s -r xX -v --tb=short --html=./report/html-report.html --self-contained-html

log_cli = true
log_level = INFO
log_format = %(asctime)s | %(levelname)s >>> %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

markers =
    regression: Esta marca ejecuta todos los tests a nivel proyecto