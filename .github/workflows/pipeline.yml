name: CLI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [ "main" ]
    types: [ opened, synchronize, reopened ]
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    inputs:
      branch:
        description: 'QA repo name'
        default: main
        required: true
      pytest_mark:
        description: 'QA mark to run tests'
        default: regression
        required: true
      run_mutation:
        description: 'Run mutation testing'
        default: 'true'
        required: true

concurrency:
  group: qa-pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Debug info
        run: |
          echo "GitHub event: ${{ github.event_name }}"
          echo "Head ref: ${{ github.head_ref }}"
          echo "Base ref: ${{ github.base_ref }}"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12.0

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -I

      - name: Configure Python Path
        run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Run tests
        run: |
          mkdir -p report
          PYTEST_MARK="${{ github.event.inputs.pytest_mark || 'regression' }}"
          pytest -m "$PYTEST_MARK" \
            --junitxml=report/junit.xml \
            --html=report/html-report.html \
            --self-contained-html

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: report/junit.xml

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: report

  mutation:
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_mutation == 'true')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12.0

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'pyproject.toml', 'setup.cfg') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -I

      - name: Configure Python Path
        run: echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV

      - name: Prepare mutation report folder
        run: mkdir -p mutation-report

      - name: Run mutation testing
        run: |
          mutmut run | tee mutation-report/mutmut-run.txt

      - name: Collect mutation results
        if: always()
        run: |
          {
            echo "=== mutmut results ==="
            mutmut results || true
            echo
            echo "=== mutmut show summary ==="
            mutmut show || true
          } | tee mutation-report/mutmut-results.txt

      - name: Extract surviving mutant IDs
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          results_file = Path("mutation-report/mutmut-results.txt")
          text = results_file.read_text(encoding="utf-8", errors="ignore")

          ids = []
          for line in text.splitlines():
              line = line.strip()
              if not line:
                  continue

              m_named = re.match(r'^([A-Za-z0-9_./]+(?:__mutmut_\d+)):\s+survived$', line)
              if m_named:
                  ids.append(m_named.group(1))
                  continue

              m_num = re.match(r'^(\d+)\b', line)
              if m_num:
                  ids.append(m_num.group(1))

          unique_ids = []
          seen = set()
          for mutant_id in ids:
              if mutant_id not in seen:
                  unique_ids.append(mutant_id)
                  seen.add(mutant_id)

          out = Path("mutation-report/surviving-mutants.txt")
          out.write_text("\n".join(unique_ids) + ("\n" if unique_ids else ""), encoding="utf-8")

          print(f"Detected surviving mutants: {len(unique_ids)}")
          for item in unique_ids:
              print(f"- {item}")
          PY

      - name: Show each surviving mutant
        if: always()
        shell: bash
        run: |
          {
            echo "=== surviving mutants details ==="
            echo
            if [ ! -s mutation-report/surviving-mutants.txt ]; then
              echo "No surviving mutants detected."
            else
              while IFS= read -r mutant_id; do
                [ -z "$mutant_id" ] && continue
                echo "----- MUTANT: $mutant_id -----"
                mutmut show "$mutant_id" || true
                echo
              done < mutation-report/surviving-mutants.txt
            fi
          } | tee mutation-report/mutmut-show.txt

      - name: Generate diff for each surviving mutant
        if: always()
        shell: bash
        run: |
          {
            echo "=== surviving mutants git diff ==="
            echo
            if [ ! -s mutation-report/surviving-mutants.txt ]; then
              echo "No surviving mutants detected."
            else
              while IFS= read -r mutant_id; do
                [ -z "$mutant_id" ] && continue

                echo "===== APPLYING: $mutant_id ====="

                # Restaurar solo archivos trackeados sin borrar mutation-report
                git reset --hard HEAD >/dev/null 2>&1 || true
                git clean -fd -e mutation-report/ >/dev/null 2>&1 || true

                if mutmut apply "$mutant_id" >/dev/null 2>&1; then
                  echo "--- git diff for $mutant_id ---"
                  git --no-pager diff -- . ':(exclude)mutants/' ':(exclude)mutation-report/' || true
                else
                  echo "Could not apply mutant: $mutant_id"
                fi

                echo
                echo "===== END: $mutant_id ====="
                echo
              done < mutation-report/surviving-mutants.txt
            fi

            git reset --hard HEAD >/dev/null 2>&1 || true
            git clean -fd -e mutation-report/ >/dev/null 2>&1 || true
          } | tee mutation-report/mutmut-diffs.txt

      - name: Calculate mutation score
        if: always()
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          report_dir = Path("mutation-report")
          report_dir.mkdir(parents=True, exist_ok=True)

          run_file = report_dir / "mutmut-run.txt"
          survived_file = report_dir / "surviving-mutants.txt"

          run_text = run_file.read_text(encoding="utf-8", errors="ignore") if run_file.exists() else ""
          survived_text = survived_file.read_text(encoding="utf-8", errors="ignore") if survived_file.exists() else ""

          def strip_ansi(text: str) -> str:
              return re.sub(r'\x1b\[[0-9;]*[A-Za-z]', '', text)

          run_clean = strip_ansi(run_text)

          surviving_ids = [line.strip() for line in survived_text.splitlines() if line.strip()]
          survived = len(surviving_ids)

          killed = None

          matches = re.findall(r'🎉\s*(\d+).*?🙁\s*(\d+)', run_clean, flags=re.DOTALL)
          if matches:
              killed, survived_from_run = map(int, matches[-1])
              # Si por alguna razón el archivo de survived quedó vacío, usamos el valor del run
              if survived == 0:
                  survived = survived_from_run

          total = killed + survived if killed is not None else None
          parse_ok = killed is not None and total is not None

          score = round((killed / total) * 100, 2) if parse_ok and total else None

          with open(report_dir / "mutation-score.txt", "w", encoding="utf-8") as f:
              f.write(f"score={'' if score is None else score}\n")
              f.write(f"killed={'' if killed is None else killed}\n")
              f.write(f"survived={survived}\n")
              f.write(f"total={'' if total is None else total}\n")
              f.write(f"parse_ok={'true' if parse_ok else 'false'}\n")

          summary_lines = [
              "## Mutation Testing Summary",
              "",
              "| Metric | Value |",
              "|---|---:|",
              f"| Mutation Score | **{'pending' if score is None else str(score) + '%'}** |",
              f"| Killed | **{'pending' if killed is None else killed}** |",
              f"| Survived | **{survived}** |",
              f"| Total evaluated | **{'pending' if total is None else total}** |",
              "",
              "### Generated files",
              "",
              "- `mutmut-run.txt`",
              "- `mutmut-results.txt`",
              "- `mutmut-show.txt`",
              "- `mutmut-diffs.txt`",
              "- `surviving-mutants.txt`",
          ]

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as f:
              f.write("\n".join(summary_lines) + "\n")
          PY

      - name: Print mutation score
        if: always()
        run: cat mutation-report/mutation-score.txt

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: mutation-report

      - name: Comment mutation summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const scoreFile = fs.readFileSync('mutation-report/mutation-score.txt', 'utf8');
            const values = Object.fromEntries(
              scoreFile
                .trim()
                .split('\n')
                .map(line => line.split('='))
            );

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const runId = process.env.GITHUB_RUN_ID;

            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: Number(runId),
            });

            const mutationArtifact = artifacts.data.artifacts.find(
              artifact => artifact.name === 'mutation-report'
            );

            const artifactUrl = mutationArtifact
              ? `https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${mutationArtifact.id}`
              : `https://github.com/${owner}/${repo}/actions/runs/${runId}`;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const marker = '<!-- mutation-testing-summary -->';
            const existing = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              (comment.body.includes(marker) || comment.body.includes('## Mutation Testing Summary'))
            );

            function extractMetric(body, name) {
              const re = new RegExp(`\\| ${name} \\| \\*\\*([^*]+)\\*\\*`);
              const match = body.match(re);
              return match ? match[1].replace('%', '').trim() : null;
            }

            let survived = parseInt(values.survived || '0', 10);
            let killed = values.killed !== '' ? parseInt(values.killed || '0', 10) : null;
            let total = values.total !== '' ? parseInt(values.total || '0', 10) : null;
            let score = values.score !== '' ? parseFloat(values.score || '0') : null;
            const parseOk = values.parse_ok === 'true';

            let previousScore = null;
            let previousTotal = null;

            if (existing) {
              const prevScoreRaw = extractMetric(existing.body, 'Mutation Score');
              const prevTotalRaw = extractMetric(existing.body, 'Total evaluated');

              previousScore = prevScoreRaw !== null ? parseFloat(prevScoreRaw) : null;
              previousTotal = prevTotalRaw !== null ? parseInt(prevTotalRaw, 10) : null;
            }

            // Fallback inteligente:
            // si no pudimos sacar total/killed del run actual pero sí sabemos cuántos survived hay,
            // reutilizamos el total anterior del comentario.
            if ((!parseOk || total === null || total === 0) && previousTotal && survived >= 0) {
              total = previousTotal;
              killed = Math.max(total - survived, 0);
              score = total > 0 ? Number(((killed / total) * 100).toFixed(2)) : 0;
            }

            let trendText = '🆕 baseline';
            if (previousScore !== null && score !== null) {
              const delta = Number((score - previousScore).toFixed(2));
              if (delta > 0) {
                trendText = `⬆️ +${delta}%`;
              } else if (delta < 0) {
                trendText = `⬇️ ${delta}%`;
              } else {
                trendText = '➡️ 0.0%';
              }
            }

            const survivedMutants = fs.existsSync('mutation-report/surviving-mutants.txt')
              ? fs.readFileSync('mutation-report/surviving-mutants.txt', 'utf8')
                  .split('\n')
                  .map(x => x.trim())
                  .filter(Boolean)
              : [];

            const mutantLines = survivedMutants.length
              ? survivedMutants.map(x => `- \`${x}\``)
              : ['- No surviving mutants detected'];

            const body = [
              marker,
              '## Mutation Testing Summary',
              '',
              '| Metric | Value |',
              '|---|---:|',
              `| Mutation Score | **${score !== null ? score : 'pending'}${score !== null ? '%' : ''}** ${trendText} |`,
              `| Killed | **${killed !== null ? killed : 'pending'}** |`,
              `| Survived | **${survived}** |`,
              `| Total evaluated | **${total !== null ? total : 'pending'}** |`,
              '',
              '### Surviving mutants',
              '',
              ...mutantLines,
              '',
              '### Mutation evidence',
              '',
              '- `mutmut-results.txt`: summary',
              '- `mutmut-show.txt`: details by mutant',
              '- `mutmut-diffs.txt`: git diff of each surviving mutant',
              '',
              `🔍 **Artifact report:** [Open mutation-report](${artifactUrl})`,
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  qa-engine:
    if: github.event_name == 'pull_request'
    needs: build
    uses: PlatformUnityCI/cross-platform-guard/.github/workflows/ai-review.yml@main
    with:
      language: python
    secrets:
      CROSS_PLATFORM_GUARD_TOKEN: ${{ secrets.CROSS_PLATFORM_GUARD_TOKEN }}
